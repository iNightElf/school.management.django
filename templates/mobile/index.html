<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Attendance</title>
<link rel="manifest" href="/m/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%231a237e'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='white'%3E✓%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#1a237e;--primary-light:#534bae;--primary-dark:#000051;--accent:#00c853;--bg:#f5f5f5;--card:#ffffff;--text:#212121;--text-secondary:#757575;--border:#e0e0e0;--present:#00c853;--absent:#ff1744;--late:#ff9100;--excused:#2979ff;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.1)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column}
header{background:var(--primary);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:10}
header h1{font-size:18px;font-weight:600;flex:1}
header .back{background:none;border:none;color:#fff;font-size:24px;padding:4px 8px;cursor:pointer;display:none}
header .back.visible{display:block}
#app{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.screen{display:none;flex-direction:column;gap:12px;animation:fadeIn .2s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.btn{display:flex;align-items:center;gap:8px;padding:14px 20px;border-radius:var(--radius);border:none;font-size:16px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;text-align:left;background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;justify-content:center}
.btn-primary:active{background:var(--primary-light)}
.btn-success{background:var(--present);color:#fff;justify-content:center}
.search{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;width:100%;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--primary)}
.teacher-list,.class-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto}
.teacher-item,.class-item{padding:14px 16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
.teacher-item:active,.class-item:active{transform:scale(.97);background:#f0f0f0}
.teacher-item .name{font-size:16px;font-weight:500}
.teacher-item .designation{font-size:13px;color:var(--text-secondary);margin-top:2px}
.pin-pad{display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px 0}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--primary);transition:all .15s}
.pin-dot.filled{background:var(--primary)}
.pin-digits{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;width:100%}
.pin-digit{height:60px;border-radius:var(--radius);border:none;background:var(--card);box-shadow:var(--shadow);font-size:24px;font-weight:500;cursor:pointer;transition:all .1s;color:var(--text)}
.pin-digit:active{transform:scale(.92);background:#e8e8e8}
.pin-digit.clear{background:#ff1744;color:#fff}
.pin-digit.clear:active{background:#d50000}
.status-grid{display:flex;flex-direction:column;gap:6px}
.student-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
.student-row:active{transform:scale(.97)}
.student-row .roll{font-size:13px;color:var(--text-secondary);min-width:36px}
.student-row .name{flex:1;font-size:15px;font-weight:500}
.student-row .status{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;text-transform:uppercase;min-width:60px;text-align:center}
.status-present{background:#e8f5e9;color:#2e7d32}
.status-absent{background:#ffebee;color:#c62828}
.status-late{background:#fff3e0;color:#e65100}
.status-excused{background:#e3f2fd;color:#1565c0}
.status-unmarked{background:#f5f5f5;color:var(--text-secondary)}
.sync-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);font-size:13px;color:var(--text-secondary)}
.sync-bar .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;display:none}
.sync-bar .spinner.active{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-bar .sync-btn{margin-left:auto;padding:6px 16px;border-radius:20px;border:none;background:var(--primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.sync-bar .sync-btn:active{opacity:.8}
.tab-bar{display:flex;background:var(--border);border-radius:var(--radius);padding:3px}
.tab-bar button{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .15s}
.tab-bar button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.range-form{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.range-form input{padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius);font-size:15px;outline:none;transition:border-color .15s}
.range-form input:focus{border-color:var(--primary)}
.report-grid{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:var(--card)}
.report-grid table{border-collapse:collapse;width:100%;font-size:12px;min-width:100%}
.report-grid th{position:sticky;top:0;background:var(--primary);color:#fff;padding:8px 6px;text-align:center;font-weight:600;white-space:nowrap;z-index:2}
.report-grid th.left-col{z-index:3;left:0}
.report-grid th.roll-col{z-index:3;left:140px}
.report-grid td{padding:6px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
.report-grid td.left-col{position:sticky;left:0;z-index:1;background:var(--card);text-align:left;font-weight:500;min-width:140px;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.report-grid td.roll-col{position:sticky;left:140px;z-index:1;background:var(--card);min-width:40px;color:var(--text-secondary)}
.report-grid td.cell-p{background:#e8f5e9;color:#2e7d32}
.report-grid td.cell-a{background:#ffebee;color:#c62828}
.report-grid td.cell-l{background:#fff3e0;color:#e65100}
.report-grid td.cell-e{background:#e3f2fd;color:#1565c0}
.report-grid td.cell-{background:#f5f5f5}
.report-grid .sum-p{color:#2e7d32;font-weight:700}
.report-grid .sum-a{color:#c62828;font-weight:700}
.report-grid .sum-l{color:#e65100;font-weight:700}
.report-grid .sum-e{color:#1565c0;font-weight:700}
.report-grid .sum-pct{font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:15px}
.offline-badge{background:#ff1744;color:#fff;font-size:11px;padding:2px 10px;border-radius:10px;font-weight:600}
.header-sub{font-size:12px;opacity:.8}
#pinError{color:#ff1744;font-size:14px;text-align:center;display:none}
</style>
</head>
<body>

<header>
  <button class="back" id="backBtn" onclick="goBack()">‹</button>
  <h1 id="headerTitle">Attendance</h1>
  <span class="offline-badge" id="offlineBadge" style="display:none">Offline</span>
</header>

<div id="app">

  <!-- Screen: Teacher Select -->
  <div class="screen active" id="screen-teachers">
    <input class="search" id="teacherSearch" type="text" placeholder="Search teachers..." oninput="filterTeachers()">
    <div class="teacher-list" id="teacherList"></div>
    <div class="empty-state" id="teacherEmpty" style="display:none">No teachers found</div>
  </div>

  <!-- Screen: PIN Entry -->
  <div class="screen" id="screen-pin">
    <div class="card" id="pinTeacherInfo"></div>
    <div class="pin-pad">
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot" data-i="0"></span>
        <span class="pin-dot" data-i="1"></span>
        <span class="pin-dot" data-i="2"></span>
        <span class="pin-dot" data-i="3"></span>
        <span class="pin-dot" data-i="4"></span>
        <span class="pin-dot" data-i="5"></span>
      </div>
      <div id="pinError"></div>
      <div class="pin-digits" id="pinDigits">
        <button class="pin-digit" onclick="pinDigit('1')">1</button>
        <button class="pin-digit" onclick="pinDigit('2')">2</button>
        <button class="pin-digit" onclick="pinDigit('3')">3</button>
        <button class="pin-digit" onclick="pinDigit('4')">4</button>
        <button class="pin-digit" onclick="pinDigit('5')">5</button>
        <button class="pin-digit" onclick="pinDigit('6')">6</button>
        <button class="pin-digit" onclick="pinDigit('7')">7</button>
        <button class="pin-digit" onclick="pinDigit('8')">8</button>
        <button class="pin-digit" onclick="pinDigit('9')">9</button>
        <button class="pin-digit clear" onclick="pinClear()">⌫</button>
        <button class="pin-digit" onclick="pinDigit('0')">0</button>
        <button class="pin-digit" onclick="pinDigit('')" style="visibility:hidden"></button>
      </div>
    </div>
  </div>

  <!-- Screen: Class Select -->
  <div class="screen" id="screen-classes">
    <div class="class-list" id="classList"></div>
  </div>

  <!-- Screen: Attendance -->
  <div class="screen" id="screen-attendance">
    <div class="tab-bar">
      <button class="active" id="tabDaily" onclick="showAttTab('daily')">Daily Mark</button>
      <button id="tabRange" onclick="showAttTab('range')">Range Report</button>
    </div>
    <div id="attDailyView">
    <div class="sync-bar" id="syncBar">
      <span class="spinner" id="syncSpinner"></span>
      <span id="syncStatus">All synced</span>
      <button class="sync-btn" onclick="syncNow()">Sync</button>
    </div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
      <span id="attDate" style="font-size:14px;font-weight:500"></span>
      <span id="attCounts" style="font-size:13px;color:var(--text-secondary)"></span>
    </div>
    <div class="status-grid" id="statusGrid"></div>
    </div>
    <div id="attRangeView" style="display:none">
      <div class="range-form">
        <input type="date" id="rangeFrom">
        <input type="date" id="rangeTo">
        <button class="btn btn-primary" onclick="loadRangeReport()">Load Report</button>
      </div>
      <div id="rangeError" style="color:var(--absent);font-size:13px;text-align:center;display:none"></div>
      <div id="rangeMeta" style="font-size:13px;color:var(--text-secondary);display:none"></div>
      <div class="report-grid" id="rangeGrid" style="display:none"></div>
    </div>
  </div>

</div>

<script>
const API_BASE = '/api';
let state = {
  teachers: [],
  selectedTeacher: null,
  token: null,
  classes: [],
  selectedClass: null,
  students: [],
  attendance: {},     // student_id → status
  localChanges: {},   // student_id → status (unsynced)
  pin: '',
  screen: 'teachers',
  history: [],
  syncQueue: [],
};

// ── Router ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');
  state.screen = name;
  document.getElementById('backBtn').classList.toggle('visible', state.history.length > 0);
}

function goBack() {
  const prev = state.history.pop();
  if (prev) {
    showScreen(prev);
    if (prev === 'teachers') { document.getElementById('headerTitle').textContent = 'Attendance'; }
    else if (prev === 'classes') { document.getElementById('headerTitle').textContent = 'Select Class'; }
  }
}

function navigate(screen) {
  state.history.push(state.screen);
  showScreen(screen);
}

// ── API Helper ──
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res = await fetch(API_BASE + path, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Network ──
function updateOnlineStatus() {
  const badge = document.getElementById('offlineBadge');
  badge.style.display = navigator.onLine ? 'none' : 'inline';
  updateSyncStatus();
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// ── Teachers Screen ──
async function loadTeachers() {
  try {
    const data = await api('/m/teachers/');
    state.teachers = data.teachers || [];
    renderTeachers();
  } catch (e) {
    document.getElementById('teacherList').innerHTML =
      '<div class="empty-state">Failed to load teachers. Check connection.</div>';
  }
}

function renderTeachers() {
  const q = (document.getElementById('teacherSearch').value || '').toLowerCase();
  const filtered = state.teachers.filter(t =>
    t.name.toLowerCase().includes(q) || t.designation.toLowerCase().includes(q)
  );
  const list = document.getElementById('teacherList');
  const empty = document.getElementById('teacherEmpty');
  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(t =>
    `<div class="teacher-item" onclick="selectTeacher('${t.id}')">
      <div class="name">${esc(t.name)}</div>
      <div class="designation">${esc(t.designation)}</div>
    </div>`
  ).join('');
}

function filterTeachers() { renderTeachers(); }

function selectTeacher(id) {
  state.selectedTeacher = state.teachers.find(t => t.id === id);
  if (!state.selectedTeacher) return;
  document.getElementById('pinTeacherInfo').innerHTML =
    `<div style="font-weight:600;font-size:16px">${esc(state.selectedTeacher.name)}</div>
     <div style="font-size:13px;color:var(--text-secondary)">${esc(state.selectedTeacher.designation)}</div>`;
  state.pin = '';
  document.getElementById('pinError').style.display = 'none';
  renderPinDots();
  document.getElementById('headerTitle').textContent = 'Enter PIN';
  navigate('pin');
}

// ── PIN Screen ──
function renderPinDots() {
  document.querySelectorAll('.pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < state.pin.length);
  });
}

function pinDigit(d) {
  document.getElementById('pinError').style.display = 'none';
  if (state.pin.length >= 6) return;
  state.pin += d;
  renderPinDots();
  if (state.pin.length === 6) verifyPin();
}

function pinClear() {
  state.pin = state.pin.slice(0, -1);
  renderPinDots();
  document.getElementById('pinError').style.display = 'none';
}

async function verifyPin() {
  try {
    const data = await api('/m/auth/pin/', {
      method: 'POST',
      body: JSON.stringify({ teacher_id: state.selectedTeacher.id, pin: state.pin }),
    });
    state.token = data.token;
    state.classes = data.classes || [];
    document.getElementById('headerTitle').textContent = 'Select Class';
    renderClasses();
    navigate('classes');
  } catch (e) {
    document.getElementById('pinError').textContent = e.message || 'Invalid PIN';
    document.getElementById('pinError').style.display = 'block';
    state.pin = '';
    renderPinDots();
  }
}

// ── Classes Screen ──
function renderClasses() {
  const list = document.getElementById('classList');
  if (state.classes.length === 0) {
    list.innerHTML = '<div class="empty-state">No classes assigned</div>';
    return;
  }
  list.innerHTML = state.classes.map(c =>
    `<div class="class-item" onclick="selectClass('${c.id}','${esc(c.name)}')">
      <div class="name">${esc(c.name)}</div>
    </div>`
  ).join('');
}

async function selectClass(id, name) {
  state.selectedClass = { id, name };
  document.getElementById('headerTitle').textContent = name;
  await loadAttendance();
  navigate('attendance');
}

// ── Attendance Screen ──
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

async function loadAttendance() {
  const date = todayStr();
  document.getElementById('attDate').textContent = formatDate(date);
  document.getElementById('statusGrid').innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const data = await api(`/m/students/?class_id=${state.selectedClass.id}`);
    state.students = data.students || [];
  } catch (e) {
    document.getElementById('statusGrid').innerHTML =
      '<div class="empty-state">Failed to load students</div>';
    return;
  }

  state.attendance = {};
  state.localChanges = {};

  try {
    const attData = await api(`/m/attendance/?class_id=${state.selectedClass.id}&date=${date}`);
    if (attData) {
      attData.forEach(r => {
        state.attendance[r.student] = r.status;
      });
    }
  } catch (e) {
    // No attendance for today yet — that's fine
  }

  // Merge local queue
  const localKey = `att_${state.selectedClass.id}_${date}`;
  try {
    const saved = JSON.parse(localStorage.getItem(localKey) || '{}');
    Object.keys(saved).forEach(sid => {
      state.attendance[sid] = saved[sid];
      state.localChanges[sid] = saved[sid];
    });
  } catch (e) {}

  updateQueue();
  renderAttendance();
}

function renderAttendance() {
  const grid = document.getElementById('statusGrid');
  if (state.students.length === 0) {
    grid.innerHTML = '<div class="empty-state">No students in this class</div>';
    return;
  }
  grid.innerHTML = state.students.map(s => {
    const status = state.attendance[s.id] || 'unmarked';
    return `<div class="student-row" onclick="toggleStatus('${s.id}')">
      <div class="roll">${esc(s.roll || '—')}</div>
      <div class="name">${esc(s.name)}</div>
      <div class="status status-${status}">${status}</div>
    </div>`;
  }).join('');
  updateCounts();
}

function toggleStatus(studentId) {
  const current = state.attendance[studentId] || 'unmarked';
  const order = ['present', 'absent', 'late', 'excused'];
  const next = current === 'unmarked' ? 'present'
    : order[(order.indexOf(current) + 1) % order.length];
  state.attendance[studentId] = next;
  state.localChanges[studentId] = next;
  renderAttendance();
  saveLocal();
  updateQueue();
  scheduleSync();
}

function saveLocal() {
  const date = todayStr();
  const localKey = `att_${state.selectedClass.id}_${date}`;
  localStorage.setItem(localKey, JSON.stringify(state.localChanges));
}

function updateCounts() {
  const counts = { present: 0, absent: 0, late: 0, excused: 0, unmarked: 0 };
  state.students.forEach(s => {
    const st = state.attendance[s.id] || 'unmarked';
    counts[st] = (counts[st] || 0) + 1;
  });
  document.getElementById('attCounts').textContent =
    `✓${counts.present} ✗${counts.absent} ⏰${counts.late} ℹ${counts.excused} —${counts.unmarked}`;
}

// ── Sync Queue ──
function updateQueue() {
  const date = todayStr();
  const changes = Object.keys(state.localChanges);
  if (changes.length === 0) {
    state.syncQueue = [];
    updateSyncStatus();
    return;
  }
  const records = {};
  changes.forEach(sid => { records[sid] = state.localChanges[sid]; });
  state.syncQueue = [{
    school_class: state.selectedClass.id,
    date,
    term: '1',
    session: String(new Date().getFullYear()),
    records,
  }];
  updateSyncStatus();
}

function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  const spinner = document.getElementById('syncSpinner');
  if (!navigator.onLine) {
    el.textContent = 'Offline — changes saved locally';
    return;
  }
  if (state.syncQueue.length === 0) {
    el.textContent = 'All synced';
    spinner.classList.remove('active');
    return;
  }
  el.textContent = `${state.syncQueue[0].records ? Object.keys(state.syncQueue[0].records).length : 0} changes pending`;
}

// ── Attendance tab toggle ──
function showAttTab(tab) {
  document.getElementById('attDailyView').style.display = tab === 'daily' ? 'block' : 'none';
  document.getElementById('attRangeView').style.display = tab === 'range' ? 'block' : 'none';
  document.getElementById('tabDaily').classList.toggle('active', tab === 'daily');
  document.getElementById('tabRange').classList.toggle('active', tab === 'range');
  if (tab === 'range') {
    const d = new Date();
    if (!document.getElementById('rangeFrom').value) {
      const first = new Date(d.getFullYear(), d.getMonth(), 1);
      document.getElementById('rangeFrom').value = first.toISOString().split('T')[0];
    }
    if (!document.getElementById('rangeTo').value) {
      document.getElementById('rangeTo').value = d.toISOString().split('T')[0];
    }
  }
}

// ── Range Report ──
async function loadRangeReport() {
  const from = document.getElementById('rangeFrom').value;
  const to = document.getElementById('rangeTo').value;
  const err = document.getElementById('rangeError');
  const meta = document.getElementById('rangeMeta');
  const grid = document.getElementById('rangeGrid');

  err.style.display = 'none';
  meta.style.display = 'none';
  grid.style.display = 'none';

  if (!from || !to) {
    err.textContent = 'Select from and to dates';
    err.style.display = 'block';
    return;
  }

  try {
    const data = await api(`/m/attendance/class-report/?class_id=${state.selectedClass.id}&from=${from}&to=${to}`);
    if (data.students.length === 0 || data.dates.length === 0) {
      err.textContent = 'No attendance records found in this range';
      err.style.display = 'block';
      return;
    }

    meta.style.display = 'block';
    meta.textContent = `${data.students.length} students · ${data.dates.length} days`;

    let html = '<table><thead><tr>';
    html += '<th class="left-col">Student</th>';
    html += '<th class="roll-col">R</th>';
    data.dates.forEach(d => {
      const label = new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
      html += `<th>${label}</th>`;
    });
    html += '<th style="color:#81c784">✓</th>';
    html += '<th style="color:#ef9a9a">✗</th>';
    html += '<th style="color:#ffcc80">⏰</th>';
    html += '<th style="color:#90caf9">ℹ</th>';
    html += '<th>%</th>';
    html += '</tr></thead><tbody>';

    data.students.forEach(s => {
      const sum = data.summary[s.id];
      html += '<tr>';
      html += `<td class="left-col">${esc(s.name)}</td>`;
      html += `<td class="roll-col">${esc(s.roll || '—')}</td>`;
      data.dates.forEach(d => {
        const st = data.grid[s.id]?.[d] || '';
        const sym = !st ? '—' : st === 'present' ? '✓' : st === 'absent' ? '✗' : st === 'late' ? '⏰' : 'ℹ';
        html += `<td class="cell-${st}">${sym}</td>`;
      });
      html += `<td class="sum-p">${sum.present}</td>`;
      html += `<td class="sum-a">${sum.absent}</td>`;
      html += `<td class="sum-l">${sum.late}</td>`;
      html += `<td class="sum-e">${sum.excused}</td>`;
      html += `<td class="sum-pct">${sum.pct}%</td>`;
      html += '</tr>';
    });

    html += '</tbody></table>';
    grid.innerHTML = html;
    grid.style.display = 'block';
  } catch (e) {
    err.textContent = e.message || 'Failed to load report';
    err.style.display = 'block';
  }
}

let syncTimer = null;
function scheduleSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(syncNow, 3000);
}

async function syncNow() {
  if (!navigator.onLine) {
    document.getElementById('syncStatus').textContent = 'Cannot sync while offline';
    return;
  }
  if (state.syncQueue.length === 0) {
    document.getElementById('syncStatus').textContent = 'All synced';
    return;
  }
  const spinner = document.getElementById('syncSpinner');
  spinner.classList.add('active');
  document.getElementById('syncStatus').textContent = 'Syncing...';

  for (const item of state.syncQueue) {
    try {
      await api('/m/attendance/batch/', {
        method: 'POST',
        body: JSON.stringify(item),
      });
      // Clear local changes that were synced
      const syncedIds = Object.keys(item.records);
      syncedIds.forEach(sid => delete state.localChanges[sid]);
      const date = todayStr();
      const localKey = `att_${item.school_class}_${date}`;
      localStorage.setItem(localKey, JSON.stringify(state.localChanges));
    } catch (e) {
      document.getElementById('syncStatus').textContent = 'Sync failed: ' + (e.message || 'error');
      spinner.classList.remove('active');
      return;
    }
  }
  state.syncQueue = [];
  spinner.classList.remove('active');
  updateSyncStatus();
}

// ── Utility ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
updateOnlineStatus();
loadTeachers();
</script>
